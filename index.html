<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="國中數學練習題庫 - 互動式數學學習平台，提供各單元練習測驗"
        />
        <title>數學家教 | Math Tutor</title>

        <!-- Google Fonts: Baloo 2 + Noto Sans TC -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <style>
            :root {
                --primary: #4f46e5;
                --primary-light: #818cf8;
                --primary-dark: #3730a3;
                --cta: #22c55e;
                --cta-hover: #16a34a;
                --background: #eef2ff;
                --text: #312e81;
                --text-light: #6366f1;
                --card-bg: #ffffff;
                --shadow: rgba(79, 70, 229, 0.15);
                --shadow-hover: rgba(79, 70, 229, 0.25);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Noto Sans TC", "Baloo 2", sans-serif;
                background: var(--background);
                color: var(--text);
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* Animated Background */
            .bg-pattern {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background:
                    radial-gradient(
                        circle at 20% 80%,
                        rgba(79, 70, 229, 0.1) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 80% 20%,
                        rgba(129, 140, 248, 0.1) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 40% 40%,
                        rgba(34, 197, 94, 0.05) 0%,
                        transparent 50%
                    );
            }

            .floating-shapes {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                pointer-events: none;
                overflow: hidden;
            }

            .shape {
                position: absolute;
                opacity: 0.1;
                animation: float 20s infinite ease-in-out;
            }

            .shape-1 {
                top: 10%;
                left: 10%;
                width: 100px;
                height: 100px;
                background: var(--primary);
                border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
                animation-delay: 0s;
            }

            .shape-2 {
                top: 60%;
                right: 10%;
                width: 150px;
                height: 150px;
                background: var(--primary-light);
                border-radius: 50%;
                animation-delay: -5s;
            }

            .shape-3 {
                bottom: 10%;
                left: 20%;
                width: 80px;
                height: 80px;
                background: var(--cta);
                border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
                animation-delay: -10s;
            }

            @keyframes float {
                0%,
                100% {
                    transform: translateY(0) rotate(0deg);
                }
                50% {
                    transform: translateY(-30px) rotate(10deg);
                }
            }

            /* Header */
            header {
                padding: 2rem 1.5rem;
                text-align: center;
                position: relative;
            }

            .logo-container {
                display: inline-flex;
                align-items: center;
                gap: 1rem;
                margin-bottom: 1rem;
            }

            .logo-icon {
                width: 60px;
                height: 60px;
                background: linear-gradient(
                    135deg,
                    var(--primary),
                    var(--primary-light)
                );
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 8px 20px var(--shadow);
                animation: pulse 2s infinite ease-in-out;
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.05);
                }
            }

            .logo-icon svg {
                width: 36px;
                height: 36px;
                fill: white;
            }

            h1 {
                font-family: "Baloo 2", cursive;
                font-size: 2.5rem;
                font-weight: 800;
                background: linear-gradient(
                    135deg,
                    var(--primary),
                    var(--text-light)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -0.02em;
            }

            .subtitle {
                font-size: 1.1rem;
                color: var(--text-light);
                margin-top: 0.5rem;
                font-weight: 500;
            }

            /* Main Container */
            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 1.5rem 3rem;
            }

            .section-title {
                font-family: "Baloo 2", cursive;
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .section-title svg {
                width: 28px;
                height: 28px;
                fill: var(--primary);
            }

            /* Test Cards Grid */
            .tests-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 1.25rem;
            }

            .test-card {
                background: var(--card-bg);
                border-radius: 20px;
                padding: 1.75rem;
                box-shadow: 0 4px 20px var(--shadow);
                transition: all 0.3s ease;
                cursor: pointer;
                text-decoration: none;
                color: inherit;
                display: flex;
                flex-direction: column;
                position: relative;
                overflow: hidden;
                border: 2px solid transparent;
            }

            .test-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                background: linear-gradient(
                    90deg,
                    var(--primary),
                    var(--primary-light),
                    var(--cta)
                );
                transform: scaleX(0);
                transform-origin: left;
                transition: transform 0.3s ease;
            }

            .test-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 30px var(--shadow-hover);
                border-color: var(--primary-light);
            }

            .test-card:hover::before {
                transform: scaleX(1);
            }

            .test-card:focus {
                outline: 3px solid var(--primary-light);
                outline-offset: 2px;
            }

            .card-icon {
                width: 48px;
                height: 48px;
                background: linear-gradient(135deg, var(--background), #fff);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1rem;
                box-shadow: 0 2px 8px rgba(79, 70, 229, 0.1);
            }

            .card-icon svg {
                width: 26px;
                height: 26px;
                fill: var(--primary);
            }

            .card-title {
                font-family: "Baloo 2", cursive;
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 0.5rem;
                line-height: 1.3;
            }

            .card-description {
                font-size: 0.9rem;
                color: var(--text-light);
                line-height: 1.5;
                flex-grow: 1;
            }

            .card-meta {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin-top: 1rem;
                padding-top: 1rem;
                border-top: 1px solid var(--background);
            }

            .meta-item {
                display: flex;
                align-items: center;
                gap: 0.35rem;
                font-size: 0.8rem;
                color: var(--text-light);
            }

            .meta-item svg {
                width: 16px;
                height: 16px;
                fill: var(--primary-light);
            }

            .start-btn {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                margin-left: auto;
                padding: 0.5rem 1rem;
                background: linear-gradient(
                    135deg,
                    var(--cta),
                    var(--cta-hover)
                );
                color: white;
                font-size: 0.85rem;
                font-weight: 600;
                border-radius: 25px;
                transition: all 0.2s ease;
            }

            .test-card:hover .start-btn {
                transform: scale(1.05);
                box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
            }

            .start-btn svg {
                width: 14px;
                height: 14px;
                fill: white;
            }

            /* Empty State */
            .empty-state {
                text-align: center;
                padding: 4rem 2rem;
                background: var(--card-bg);
                border-radius: 20px;
                box-shadow: 0 4px 20px var(--shadow);
            }

            .empty-state svg {
                width: 80px;
                height: 80px;
                fill: var(--primary-light);
                margin-bottom: 1.5rem;
                opacity: 0.5;
            }

            .empty-state h3 {
                font-family: "Baloo 2", cursive;
                font-size: 1.5rem;
                color: var(--text);
                margin-bottom: 0.5rem;
            }

            .empty-state p {
                color: var(--text-light);
            }

            /* Footer */
            footer {
                text-align: center;
                padding: 2rem;
                color: var(--text-light);
                font-size: 0.9rem;
            }

            footer a {
                color: var(--primary);
                text-decoration: none;
                font-weight: 600;
                transition: color 0.2s ease;
            }

            footer a:hover {
                color: var(--primary-dark);
            }

            /* Responsive */
            @media (max-width: 640px) {
                h1 {
                    font-size: 2rem;
                }

                .tests-grid {
                    grid-template-columns: 1fr;
                }

                .test-card {
                    padding: 1.5rem;
                }
            }

            /* Reduced Motion */
            @media (prefers-reduced-motion: reduce) {
                .shape,
                .logo-icon {
                    animation: none;
                }

                .test-card,
                .test-card::before,
                .start-btn {
                    transition: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="bg-pattern"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <!-- Calculator/Math Icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2zm-8 8H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2z"
                        />
                    </svg>
                </div>
                <div>
                    <h1>數學家教</h1>
                </div>
            </div>
            <p class="subtitle">互動式國中數學練習平台</p>
        </header>

        <main>
            <h2 class="section-title">
                <!-- Book Icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"
                    />
                </svg>
                練習測驗
            </h2>

            <div class="tests-grid" id="tests-container">
                <!-- Test cards will be dynamically generated -->
            </div>
        </main>

        <footer>
            <p>Made with ❤️ for learning mathematics</p>
        </footer>

        <script>
            // Define all available tests with metadata
            const tests = [
                {
                    file: "math-tests/二元一次方程式與圖形.html",
                    title: "二元一次方程式與圖形",
                    description:
                        "學習二元一次方程式的圖形表示，包含直線方程式、座標判斷、平行與垂直等概念。",
                    questionCount: 61,
                    difficulty: "中等",
                    icon: "graph",
                },
                {
                    file: "math-tests/2.22二元一次方程式的圖形.pdf",
                    title: "二元一次方程式與圖形(Hard)",
                    description:
                        "學習二元一次方程式的圖形表示，包含直線方程式、座標判斷、平行與垂直等概念。",
                    questionCount: 100,
                    difficulty: "困難",
                    icon: "graph",
                },
                {
                    file: "math-tests/asdas.html",
                    title: "3/18",
                    description: "3/18",
                    questionCount: 15,
                    difficulty: "困難",
                    icon: "graph",
                },
                // More tests can be added here
            ];

            // Icons for different topics
            const icons = {
                graph: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
            </svg>`,
                equation: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>`,
                geometry: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L1 21h22L12 2zm0 3.83L19.13 19H4.87L12 5.83z"/>
            </svg>`,
                default: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>`,
            };

            function renderTests() {
                const container = document.getElementById("tests-container");

                if (tests.length === 0) {
                    container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                        </svg>
                        <h3>尚無練習測驗</h3>
                        <p>練習測驗即將推出，敬請期待！</p>
                    </div>
                `;
                    return;
                }

                container.innerHTML = tests
                    .map(
                        (test) => `
                <a href="${test.file}" class="test-card" id="test-${test.file.replace(/[^a-zA-Z0-9]/g, "-")}">
                    <div class="card-icon">
                        ${icons[test.icon] || icons.default}
                    </div>
                    <h3 class="card-title">${test.title}</h3>
                    <p class="card-description">${test.description}</p>
                    <div class="card-meta">
                        <span class="meta-item">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V8h2v5z"/>
                            </svg>
                            ${test.questionCount} 題
                        </span>
                        <span class="meta-item">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                            ${test.difficulty}
                        </span>
                        <span class="start-btn">
                            開始練習
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                            </svg>
                        </span>
                    </div>
                </a>
            `,
                    )
                    .join("");
            }

            // Initialize
            document.addEventListener("DOMContentLoaded", renderTests);
        </script>
    </body>
</html>
